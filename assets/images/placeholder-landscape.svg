<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder landscape image</title>
  <desc id="desc">A neutral placeholder for workshop feature images.</desc>
  <defs>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b07c57"/>
      <stop offset="100%" stop-color="#6f3f2d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#land)"/>
  <rect x="90" y="90" width="1020" height="620" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="10"/>
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" fill="#f7efe4" font-family="Georgia, serif" font-size="70">Workshop Placeholder</text>
</svg>
